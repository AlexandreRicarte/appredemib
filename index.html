<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="theme-color" content="#090C10"/>
<title>Rede MIB Conecta</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#090C10;font-family:'DM Sans',sans-serif;overflow-x:hidden}
:root{
  --gold:#D4A843;--goldL:#F2D070;--goldD:#7A5A10;
  --green:#2E7D3A;--greenL:#45B055;
  --blue:#1C3A5E;--blueL:#2D5F96;
  --bg:#090C10;--card:#111820;--surf:#171F28;--surfHi:#1D2730;
  --rim:#273545;--text:#ECE8E0;--muted:#607585;--live:#35D468;
}
@keyframes spin   {to{transform:rotate(360deg)}}
@keyframes wave   {0%{height:3px}100%{height:22px}}
@keyframes pulse  {0%,100%{opacity:1}50%{opacity:.2}}
@keyframes fadeUp {from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}

.app-bg{
  min-height:100vh;
  background:
    radial-gradient(ellipse at 15% 0%,rgba(28,58,94,.4) 0%,transparent 55%),
    radial-gradient(ellipse at 85% 100%,rgba(46,125,58,.22) 0%,transparent 55%),
    #090C10;
  display:flex;align-items:center;justify-content:center;padding:16px;
}
.card{
  width:100%;max-width:400px;
  background:linear-gradient(155deg,#1a2432 0%,#101820 55%,#182030 100%);
  border-radius:28px;overflow:hidden;
  box-shadow:0 32px 80px rgba(0,0,0,.9),0 0 0 1px var(--rim),inset 0 1px 0 rgba(255,255,255,.06);
  animation:fadeUp .45s ease;
}

/* HEADER */
.header{
  padding:16px 20px 12px;border-bottom:1px solid var(--rim);
  background:linear-gradient(180deg,var(--surfHi) 0%,transparent 100%);
  display:flex;align-items:center;justify-content:space-between;
}
.logo{height:64px;width:auto;object-fit:contain;filter:drop-shadow(0 2px 12px rgba(0,0,0,.6))}
.live-badge{display:flex;flex-direction:column;align-items:center;gap:5px}
.live-dot{width:11px;height:11px;border-radius:50%;background:var(--rim);transition:all .4s}
.live-dot.on{background:var(--live);box-shadow:0 0 14px var(--live);animation:pulse 1.6s ease infinite}
.live-label{font-family:'Rajdhani',sans-serif;font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:600;transition:color .4s}
.live-label.on{color:var(--live)}

/* DISCO */
.section{padding:22px 24px 16px}
.disc-wrap{position:relative;width:148px;height:148px;margin:0 auto}
.disc-ring{position:absolute;inset:-5px;border-radius:50%;background:conic-gradient(var(--gold),var(--green),var(--blueL),var(--goldL),var(--gold));transition:filter 1s}
.disc-ring.spin{animation:spin 7s linear infinite;filter:drop-shadow(0 0 14px rgba(212,168,67,.4)) drop-shadow(0 0 28px rgba(46,125,58,.3))}
.disc-bezel{position:absolute;inset:2px;border-radius:50%;background:conic-gradient(#283848,#3d5060,#283848,#1e2e3c,#283848)}
.disc-face{position:absolute;inset:10px;border-radius:50%;overflow:hidden;background:radial-gradient(circle at 37% 30%,var(--surfHi),var(--bg));display:flex;align-items:center;justify-content:center}
.disc-cover{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:none}
.disc-label{font-family:'Rajdhani',sans-serif;font-size:24px;font-weight:700;letter-spacing:2px;background:linear-gradient(135deg,var(--goldD),var(--gold),var(--goldL));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.disc-pin{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;background:linear-gradient(135deg,var(--goldD),var(--gold),var(--goldL));box-shadow:0 0 10px var(--gold);z-index:2}

/* WAVES */
.waves{display:flex;align-items:flex-end;justify-content:center;gap:3px;height:24px;margin:16px 0 14px}
.bar{width:3px;border-radius:2px;min-height:3px;height:3px;opacity:.15;transition:opacity .5s}
.bar.on{opacity:1}

/* META */
.meta-panel{
  background:linear-gradient(135deg,var(--surf),var(--surfHi));
  border:1px solid var(--rim);border-radius:10px;padding:10px 14px;
  box-shadow:inset 0 2px 8px rgba(0,0,0,.45);margin-bottom:20px;
}
.meta-title{font-family:'Rajdhani',sans-serif;font-size:16px;font-weight:600;color:var(--text);letter-spacing:.4px;margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meta-artist{font-size:12px;color:var(--gold);font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* CONTROLES */
.controls{display:flex;align-items:center;justify-content:center;gap:22px;margin-bottom:22px}
.btn{
  border:none;outline:none;cursor:pointer;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;transition:transform .12s,box-shadow .3s;
  background:radial-gradient(circle at 35% 28%,#2c3d4c,#141c24);
  box-shadow:inset 0 1px 1px rgba(255,255,255,.08),inset 0 -2px 4px rgba(0,0,0,.5),0 5px 14px rgba(0,0,0,.65);
  color:var(--muted);
}
.btn::before{content:'';position:absolute;top:10%;left:16%;width:42%;height:28%;border-radius:50%;background:rgba(255,255,255,.08);pointer-events:none}
.btn:active{transform:scale(.9)}
.btn-play{width:76px;height:76px;font-size:26px}
.btn-stop{width:58px;height:58px;font-size:20px}
.btn-play.on{
  background:linear-gradient(135deg,#163520,var(--green),var(--greenL),var(--green),#163520);
  box-shadow:0 0 22px rgba(69,176,85,.4),inset 0 1px 1px rgba(255,255,255,.15),inset 0 -2px 4px rgba(0,0,0,.5);
  color:#fff;
}
.spinner{width:24px;height:24px;border-radius:50%;border:3px solid var(--rim);border-top:3px solid var(--gold);animation:spin .7s linear infinite}

/* VOLUME */
.vol-row{display:flex;align-items:center;gap:10px;padding:0 2px}
.vol-icon{font-size:13px;color:var(--muted)}
input[type=range]{-webkit-appearance:none;appearance:none;background:transparent;flex:1;cursor:pointer;height:20px}
input[type=range]::-webkit-slider-runnable-track{height:4px;border-radius:2px;background:linear-gradient(90deg,var(--gold),var(--greenL))}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:50%;margin-top:-5.5px;background:radial-gradient(circle at 35% 30%,var(--goldL),var(--gold));box-shadow:0 0 7px rgba(212,168,67,.6)}

/* DIVIDER */
.divider{height:2px;margin:0 22px 14px;border-radius:1px;opacity:.5;background:linear-gradient(90deg,var(--blue),var(--gold),var(--green),var(--gold),var(--blue))}

/* AD */
.ad-wrap{margin:0 14px 14px;border-radius:10px;overflow:hidden;background:linear-gradient(155deg,#1a2432,#101820);border:1px solid var(--rim)}
.ad-tag{padding:4px 12px;font-size:9px;color:var(--muted);letter-spacing:2px;text-transform:uppercase;border-bottom:1px solid var(--rim);background:linear-gradient(90deg,rgba(28,58,94,.2),transparent)}
.ad-body{padding:13px 14px;display:flex;align-items:center;justify-content:space-between;transition:background .6s}
.ad-name{font-size:14px;font-weight:600;color:var(--text)}
.ad-sub{font-size:11px;color:var(--muted);margin-top:3px}
.ad-icon{width:42px;height:42px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}

/* TICKER */
.ticker{display:flex;align-items:center;background:linear-gradient(90deg,var(--blue),var(--blueL),var(--blue));border-top:2px solid var(--gold);padding:8px 0;overflow:hidden}
.ticker-tag{flex-shrink:0;padding:0 12px;font-family:'Rajdhani',sans-serif;font-size:9px;font-weight:700;letter-spacing:2.5px;color:var(--gold);text-transform:uppercase;border-right:1px solid rgba(212,168,67,.3);margin-right:10px}
.ticker-scroll{overflow:hidden;flex:1}
.ticker-inner{display:inline-block;white-space:nowrap;font-size:11px;color:#d8e4f0}
</style>
</head>

<!-- AUDIO ELEMENT -->
<audio id="radio" preload="none"></audio>

<script>
/* ── CONFIG ── */
const STREAM = "https://servidor16-1.brlogic.com:7126/live";
const META   = [
  "https://servidor16-1.brlogic.com:7126/currentsong",
  "https://servidor16-1.brlogic.com:7126/status-json.xsl",
  "https://servidor16-1.brlogic.com:7126/7.html",
];
const POLL = 10000;

/* ── WAVES ── */
const wavesEl = document.getElementById("waves");
const COLORS  = ["#D4A843","#45B055","#2D5F96"];
const bars = Array.from({length:20}, (_,i) => {
  const d = document.createElement("div");
  d.className = "bar";
  d.style.background = COLORS[i%3];
  wavesEl.appendChild(d);
  return d;
});
function animWaves(on) {
  bars.forEach((b,i) => {
    b.className = "bar"+(on?" on":"");
    b.style.animation = on ? `wave ${.44+(i*.085%.52)}s ease-in-out ${i*.033}s infinite alternate` : "none";
    b.style.height = on ? "" : "3px";
  });
}

/* ── STATE ── */
const audio   = document.getElementById("radio");
const btnPlay = document.getElementById("btnPlay");
let playing   = false;
let lastKey   = "";

function setUI(on) {
  playing = on;
  document.getElementById("ring").className = "disc-ring"+(on?" spin":"");
  document.getElementById("dot").className  = "live-dot"+(on?" on":"");
  document.getElementById("lbl").className  = "live-label"+(on?" on":"");
  document.getElementById("lbl").textContent = on ? "AO VIVO" : "OFF";
  btnPlay.className = "btn btn-play"+(on?" on":"");
  animWaves(on);
}

/* ── PLAY / STOP ── */
function doPlay() {
  if (playing) return;
  btnPlay.innerHTML = '<div class="spinner"></div>';
  audio.src = STREAM;
  audio.volume = parseFloat(document.getElementById("vol").value);
  audio.play()
    .then(() => { setUI(true); btnPlay.textContent = "▶"; })
    .catch(() => {
      btnPlay.textContent = "▶";
      alert("Toque novamente para iniciar o áudio.");
    });
}

function doStop() {
  audio.pause();
  audio.src = "";
  setUI(false);
  btnPlay.textContent = "▶";
}

function setVol(v) { audio.volume = parseFloat(v); }

audio.addEventListener("play",  () => setUI(true));
audio.addEventListener("pause", () => setUI(false));
audio.addEventListener("error", () => { setUI(false); btnPlay.textContent = "▶"; });

/* ── METADATA ── */
async function fetchMeta() {
  // 1) currentsong — texto "Artista - Título"
  try {
    const r = await fetch(META[0]+"?t="+Date.now(), {cache:"no-store"});
    const t = (await r.text()).trim();
    if (t && t.length > 2) {
      if (t.includes(" - ")) {
        const i = t.indexOf(" - ");
        return {artist:t.slice(0,i).trim(), title:t.slice(i+3).trim()};
      }
      return {artist:"Rede MIB", title:t};
    }
  } catch(e){}

  // 2) status-json.xsl — Icecast/Shoutcast v2
  try {
    const r = await fetch(META[1]+"?t="+Date.now(), {cache:"no-store"});
    const d = await r.json();
    const s = Array.isArray(d?.icestats?.source) ? d.icestats.source[0] : d?.icestats?.source;
    const track = s?.title || s?.["stream_title"] || "";
    if (track.includes(" - ")) {
      const i = track.indexOf(" - ");
      return {artist:track.slice(0,i).trim(), title:track.slice(i+3).trim()};
    }
    if (track) return {artist:"Rede MIB", title:track};
  } catch(e){}

  // 3) 7.html — Shoutcast v1 CSV
  try {
    const r = await fetch(META[2]+"?t="+Date.now(), {cache:"no-store"});
    const t = (await r.text()).trim();
    const p = t.split(",");
    const track = (p[6]||p[5]||"").trim().replace(/<[^>]+>/g,"");
    if (track.includes(" - ")) {
      const i = track.indexOf(" - ");
      return {artist:track.slice(0,i).trim(), title:track.slice(i+3).trim()};
    }
  } catch(e){}

  return null;
}

async function fetchCover(artist, title) {
  try {
    const q = encodeURIComponent(artist+" "+title);
    const r = await fetch("https://itunes.apple.com/search?term="+q+"&media=music&limit=1");
    const d = await r.json();
    if (d.resultCount > 0)
      return d.results[0].artworkUrl100.replace("100x100bb","600x600bb");
  } catch(e){}
  return null;
}

function showCover(url) {
  const img = document.getElementById("cover");
  const lbl = document.getElementById("discLbl");
  if (url) {
    img.src = url; img.style.display = "block"; lbl.style.display = "none";
  } else {
    img.style.display = "none"; lbl.style.display = "";
  }
}

async function poll() {
  const meta = await fetchMeta();
  if (!meta) return;
  const key = meta.artist+"|"+meta.title;
  if (key === lastKey) return;
  lastKey = key;
  document.getElementById("title").textContent  = meta.title  || "No Ar Agora";
  document.getElementById("artist").textContent = meta.artist || "Rede MIB Conecta";
  showCover(null);
  const url = await fetchCover(meta.artist, meta.title);
  showCover(url);
}
poll();
setInterval(poll, POLL);

];

(function loop(){
  tx -= 0.7;
  const w = tickEl.offsetWidth;
